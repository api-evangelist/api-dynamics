common:
  - type: Website
    url: https://www.apidynamics.com
  - type: Blog
    url: https://www.apidynamics.com/news
  - type: Login
    url: https://app.apidynamics.com
  - type: SignUp
    url: https://www.apidynamics.com/signup
  - type: Support
    url: https://www.apidynamics.com/contact
  - type: Features
    data:
      - name: API Discovery
        description: >-
          Automatically scan traffic, code, gateways, and ingress to build
          a complete API inventory with no blind spots, detecting shadow APIs
          and zombie APIs.
      - name: Real-Time Risk Scoring
        description: >-
          Continuously assess and score API risk in real time using AI and
          machine learning to analyze traffic patterns and detect anomalies
          that may indicate an attack.
      - name: Adaptive Multi-Factor Authentication
        description: >-
          Adaptive MFA that adjusts authentication requirements based on
          risk level, securing every API call including machine-to-machine
          and non-human interactions.
      - name: Zero Trust Enforcement
        description: >-
          Unified control plane with Zero Trust enforcement ensuring no API
          call is trusted by default and all requests are continuously
          validated.
      - name: BOLA and BFLA Detection
        description: >-
          Detect Broken Object Level Authorization (BOLA) and Broken Function
          Level Authorization (BFLA) vulnerabilities — the top API security
          risks identified by OWASP.
      - name: Sensitive Data Tracking
        description: >-
          Track and monitor sensitive data flowing through API calls to
          identify data exposure risks and ensure compliance.
      - name: AI Security for APIs
        description: >-
          AI-powered security analysis that predicts and counters new attack
          patterns, including security for AI/ML API endpoints.
      - name: CI/CD Integration
        description: >-
          Embed API security testing and traffic insights into DevOps and
          CI/CD pipelines for shift-left security practices.
  - type: UseCases
    data:
      - name: API Security Posture Management
        description: >-
          Continuously assess and improve the security posture of all APIs
          across the organization using automated scanning and risk scoring.
      - name: Shadow API Elimination
        description: >-
          Discover and remediate shadow APIs and zombie APIs that create
          security blind spots and compliance risks.
      - name: Zero Trust API Access
        description: >-
          Implement Zero Trust security for API access with adaptive MFA
          and continuous verification of every API call.
      - name: Compliance and Data Protection
        description: >-
          Track sensitive data in API traffic to meet compliance requirements
          and prevent unauthorized data exposure.
  - type: Integrations
    data:
      - name: CI/CD Pipelines
        description: >-
          Integrates with CI/CD pipeline tools to embed API security
          testing throughout the software development lifecycle.
      - name: API Gateways
        description: >-
          Integrates with API gateway solutions to provide traffic analysis
          and security enforcement at the gateway layer.
